name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Get date
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host=${{ secrets.SUPABASE_DB_HOST }} \
            --port=6543 \
            --username=postgres.mptgiyvpogloymlrwncb \
            --dbname=postgres \
            --no-owner \
            --no-acl \
            --format=custom \
            --file=backup-${{ steps.date.outputs.date }}.dump

      - name: Compress backup
        run: gzip backup-${{ steps.date.outputs.date }}.dump

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.date.outputs.date }}
          path: backup-${{ steps.date.outputs.date }}.dump.gz
          retention-days: 90
